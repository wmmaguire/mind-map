services:
  - type: web
    name: talk-graph
    env: node
    buildCommand: |
      npm install && \
      cd client && npm install && npm run build && \
      cd ../server && npm install
    startCommand: cd server && node server.js
    # Set OPENAI_API_KEY, MONGODB_URI, and optionally CORS_ORIGINS / DATA_DIR in the Render dashboard.
    envVars:
      - key: NODE_ENV
        value: production